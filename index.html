<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nicolás Gula</title>
  <meta name="description" content="Nicolás Gula — I build software: iOS apps, games, and tools, with a background in offensive security.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    // Apply the saved theme before the page paints to avoid a flash
    (function () {
      var saved = localStorage.getItem('theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
    })();
    // Decide whether to play the intro typing animation. It runs once per
    // browser session and is skipped if the visitor prefers reduced motion.
    // Adding the class here (before paint) hides the hero so there is no flash.
    (function () {
      try {
        var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (!reduce && !sessionStorage.getItem('introPlayed')) {
          document.documentElement.classList.add('intro');
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <main>
    <section class="terminal-window">
      <div class="terminal-bar">
        <span class="dot dot-red"></span>
        <span class="dot dot-yellow"></span>
        <span class="dot dot-green"></span>
        <span class="terminal-title">nicolasgula.dev — zsh</span>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle light and dark theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>

      <div class="terminal-body terminal-body--center">
        <div class="terminal-content hero">
          <p class="cmd reveal"><span class="prompt">$</span> <span class="cmd-text">whoami</span></p>
          <h1 class="name reveal">Nicolás Gula</h1>

          <p class="cmd reveal"><span class="prompt">$</span> <span class="cmd-text">cat about.txt</span></p>
          <p class="about reveal"><span class="about-text">I build software — iOS apps, games, and tools — with a background in offensive security.</span></p>

          <p class="cmd reveal"><span class="prompt">$</span> <span class="cmd-text">cat links.txt</span></p>
          <nav class="links reveal">
            <a href="projects.html">&rarr; projects</a>
            <!-- TODO: replace with your real LinkedIn profile URL -->
            <a href="https://www.linkedin.com/in/YOUR-PROFILE" target="_blank" rel="noopener">&rarr; linkedin</a>
          </nav>

          <p class="cmd reveal prompt-final"><span class="prompt">$</span> <span class="cursor" aria-hidden="true"></span></p>
        </div>
      </div>
    </section>
  </main>

  <script src="intro.js"></script>
  <script src="theme.js"></script>
</body>
</html>
